name: Update eToro Data

on:
  schedule:
    # Scrape every 2h from 08:00-16:00 Swiss CEST (06:00-14:00 UTC)
    # eToro update timing is unpredictable — multiple runs ensure we catch it
    # Swiss CEST: 08:00, 10:00, 12:00, 14:00, 16:00
    # Swiss CET:  07:00, 09:00, 11:00, 13:00, 15:00
    - cron: '0 6,8,10,12,14 * * 1-6'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update-etoro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager sqlmodel psycopg2-binary pandas

      - name: Run eToro scraper
        run: |
          python scripts/update_etoro_data.py

      - name: Upload to Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/upload_etoro_to_supabase.py
